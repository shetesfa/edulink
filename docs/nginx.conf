# /etc/nginx/sites-available/edulink
# EduLink Production Nginx Configuration
# Run: sudo ln -s /etc/nginx/sites-available/edulink /etc/nginx/sites-enabled/
# Then: sudo certbot --nginx -d edulink.com -d www.edulink.com

# Redirect HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name edulink.com www.edulink.com;
    return 301 https://$host$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name edulink.com www.edulink.com;

    # ── SSL (filled by certbot) ──────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/edulink.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/edulink.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Root (React PWA) ─────────────────────────────────────
    root  /var/www/edulink/frontend/dist;
    index index.html;

    # ── Logging ──────────────────────────────────────────────
    access_log /var/log/nginx/edulink-access.log;
    error_log  /var/log/nginx/edulink-error.log;

    # ── File upload limit ────────────────────────────────────
    client_max_body_size 100M;
    client_body_timeout  120s;

    # ── Security headers ─────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"               always;
    add_header X-Content-Type-Options    "nosniff"                  always;
    add_header X-XSS-Protection          "1; mode=block"            always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "camera=(), microphone=(), geolocation=()" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Content-Security-Policy
        "default-src 'self' https: wss:; \
         script-src 'self' 'unsafe-inline' 'unsafe-eval' https://meet.jit.si https://fonts.googleapis.com; \
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://fonts.gstatic.com; \
         font-src 'self' https://fonts.gstatic.com; \
         img-src 'self' data: blob: https:; \
         media-src 'self' blob: https:; \
         connect-src 'self' wss: https:; \
         frame-src https://meet.jit.si;" always;

    # ── Gzip ────────────────────────────────────────────────
    gzip            on;
    gzip_vary       on;
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain text/css text/xml application/json
        application/javascript application/xml+rss
        application/atom+xml image/svg+xml
        font/woff font/woff2;

    # ────────────────────────────────────────────────────────
    # ROUTES
    # ────────────────────────────────────────────────────────

    # Laravel API
    location /api {
        try_files $uri $uri/ @laravel;
    }

    location @laravel {
        fastcgi_pass            unix:/var/run/php/php8.2-fpm.sock;
        fastcgi_param           SCRIPT_FILENAME /var/www/edulink/backend/public/index.php;
        fastcgi_param           PATH_INFO $fastcgi_path_info;
        include                 fastcgi_params;
        fastcgi_read_timeout    120s;
        fastcgi_buffer_size     32k;
        fastcgi_buffers         8 16k;
    }

    # Laravel storage (uploaded files)
    location /storage {
        alias /var/www/edulink/backend/storage/app/public;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Socket.io WebSocket (real-time)
    location /socket.io {
        proxy_pass              http://127.0.0.1:3001;
        proxy_http_version      1.1;
        proxy_set_header        Upgrade    $http_upgrade;
        proxy_set_header        Connection "upgrade";
        proxy_set_header        Host       $host;
        proxy_set_header        X-Real-IP  $remote_addr;
        proxy_set_header        X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header        X-Forwarded-Proto $scheme;
        proxy_cache_bypass      $http_upgrade;
        proxy_read_timeout      86400s;
        proxy_send_timeout      86400s;
    }

    # Internal socket server endpoints (called by Laravel)
    location /internal {
        proxy_pass          http://127.0.0.1:3001;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        # Block external access
        allow 127.0.0.1;
        deny  all;
    }

    # PWA manifest and service worker (no cache)
    location ~* \.(webmanifest|json)$ {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache";
        try_files $uri =404;
    }

    # Static assets (long cache)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp|avif)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        try_files   $uri =404;
    }

    # React SPA fallback — all unmatched routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
